name: CMake Release Packaging

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      # Строчку submodules убрали, чтобы избежать фатальных ошибок Git

    # Самостоятельно скачиваем чистый gtest прямо в облачную виртуалку
    - name: Setup Google Test Submodule
      run: |
        rm -rf third-party/gtest
        git clone https://github.com/google/googletest third-party/gtest
        cd third-party/gtest && git checkout release-1.8.1

    - name: Install Packaging Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm dpkg-dev

    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCPACK_GENERATOR="TGZ;DEB;RPM"

    - name: Build Project
      run: cmake --build _build

    - name: Run Tests
      run: cmake --build _build --target test

    # Собираем пакеты
    - name: Generate Packages via CPack
      run: |
        cd _build
        cpack

    # Публикуем релиз со всеми бинарниками
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
