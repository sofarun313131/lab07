name: CMake Release Packaging

# Конвейер запускается при пушах в main и ОБЯЗАТЕЛЬНО при создании тегов (v*)
on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    # Даем права на создание релизов внутри репозитория
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install RPM Tools
      run: sudo apt-get update && sudo apt-get install -y rpm

    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON

    - name: Build Project
      run: cmake --build _build

    - name: Run Tests
      run: cmake --build _build --target test

    # Генерируем сразу несколько типов пакетов (архив и DEB/RPM инсталляторы)
    # Это заменяет ветвление из старого Travis CI
    - name: Generate Packages via CPack
      run: |
        cd _build
        cpack -G "TGZ"
        cpack -G "DEB"
        cpack -G "RPM"

    # Шаг автоматической публикации релиза (срабатывает ТОЛЬКО если это пуш тега)
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
